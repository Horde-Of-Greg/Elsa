name: Version Bump
on:
    push:
        branches:
            - main

concurrency:
    group: bump-${{ github.ref }}
    cancel-in-progress: false

jobs:
    bump:
        if: ${{ github.actor != 'hog-management[bot]' }}
        runs-on: ubuntu-latest
        permissions:
            actions: none
            checks: none
            contents: write
            issues: none
            pull-requests: none
        steps:
            - name: Create GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ vars.HOG_MANAGEMENT_APP_ID }}
                  private-key: ${{ secrets.APP_KEY }}
                  permission-contents: write

            - name: Get GitHub App user ID
              id: app-user
              run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}

            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm ci

            - name: Analyze Commit
              id: commit-lint
              run: npm run cli -- analyzeCommit --to-github
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
                  git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

            - name: Rebase Before Bumping
              if: steps.commit-lint.outputs.bump-type != 'none'
              run: git pull --rebase --autostash origin main

            - name: Bump Version Elsa
              id: elsa-bump
              if: steps.commit-lint.outputs.bump-type != 'none' && (steps.commit-lint.outputs.scope == 'elsa' || steps.commit-lint.outputs.scope == 'all')
              run: npm run cli -- bump elsa ${{ steps.commit-lint.outputs.bump-type }} --to-github

            - name: Bump Version Tools
              id: tools-bump
              if: steps.commit-lint.outputs.bump-type != 'none' && (steps.commit-lint.outputs.scope == 'tools' || steps.commit-lint.outputs.scope == 'all')
              run: npm run cli -- bump tools ${{ steps.commit-lint.outputs.bump-type }} --to-github

            - name: Commit Changes
              id: auto-commit
              if: steps.commit-lint.outputs.bump-type != 'none'
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
              with:
                  commit_message: "[AUTO]: Bump to v${{  steps.commit-lint.outputs.new-version }}\n\nBump = ${{ steps.commit-lint.outputs.bump-type }}"
                  commit_author: ${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>
                  commit_user_name: ${{ steps.app-token.outputs.app-slug }}[bot]
                  commit_user_email: ${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
                  skip_push: true

            - name: Rebase In Case of Another Simultaneous Bump
              if: steps.auto-commit.outputs.changes_detected == 'true'
              run: git pull --rebase --autostash origin main

            - name: Create Tag
              if: steps.elsa-bump.outputs.new-version != '' && steps.auto-commit.outputs.changes_detected == 'true'
              run: git tag -a "v${{ steps.elsa-bump.outputs.new-version }}" -m "Elsa v${{ steps.elsa-bump.outputs.new-version }}"

            - name: Push Changes
              if: steps.auto-commit.outputs.changes_detected == 'true'
              run: |
                  git push origin HEAD:main

                  if [ -n "${{ steps.elsa-bump.outputs.new-version }}" ]; then
                    git push origin "refs/tags/v${{ steps.elsa-bump.outputs.new-version }}"
                  fi
