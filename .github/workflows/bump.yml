name: Version Bump
on:
    push:
        branches:
            - main

concurrency:
    group: bump-${{ github.ref }}
    cancel-in-progress: false

jobs:
    bump:
        if: ${{ github.actor != 'hog-management[bot]' }}
        runs-on: ubuntu-latest
        permissions:
            actions: none
            checks: none
            contents: write
            issues: none
            pull-requests: none
        steps:
            - name: Create GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ vars.HOG_MANAGEMENT_APP_ID }}
                  private-key: ${{ secrets.APP_KEY }}

            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm ci

            - name: Analyze Commit
              id: commit-lint
              run: npm run cli -- analyzeCommit --to-github
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Configure Git
              run: |
                  git config user.name "hog-management[bot]"
                  git config user.email "1048098+hog-management[bot]@users.noreply.github.com"

            - name: Bump Version Elsa
              id: elsa-bump
              if: steps.commit-lint.outputs.bump-type != 'none' && github.actor != 'hog-management[bot]' && (steps.commit-lint.outputs.scope == 'elsa' || steps.commit-lint.outputs.scope == 'all')
              run: npm run cli -- bump elsa ${{ steps.commit-lint.outputs.bump-type }} --to-github

            - name: Bump Version Tools
              id: tools-bump
              if: steps.commit-lint.outputs.bump-type != 'none' && github.actor != 'hog-management[bot]' && (steps.commit-lint.outputs.scope == 'tools' || steps.commit-lint.outputs.scope == 'all')
              run: npm run cli -- bump tools ${{ steps.commit-lint.outputs.bump-type }} --to-github

            - name: Commit Changes
              if: steps.commit-lint.outputs.bump-type != 'none' && github.actor != 'hog-management[bot]'
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
              with:
                  commit_message: "[AUTO]: Bump to v${{  steps.commit-lint.outputs.new-version }}\n\nBump = ${{ steps.commit-lint.outputs.bump-type }}"
                  commit_author: hog-management[bot] <1048098+hog-management[bot]@users.noreply.github.com>
                  commit_user_name: hog-management[bot]
                  commit_user_email: 1048098+hog-management[bot]@users.noreply.github.com
                  skip_push: true

            - name: Create Tag
              if: steps.elsa-bump.outputs.new-version != null
              run: git tag v${{ steps.elsa-bump.outputs.new-version }}

            - name: Push Changes
              if: steps.commit-lint.outputs.bump-type != 'none'
              run: |
                  git pull --rebase
                  git push
                  git push --tags
